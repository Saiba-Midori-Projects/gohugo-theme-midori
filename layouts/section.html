{{ define "main" }}
  <article class="post-content">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    {{ range .Pages }}
      <section>
        <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
        {{ .Summary }}
      </section>
    {{ end }}
  </article>
{{ end }}

{{ define "toc" }}
  {{ partial "toc.html" . }}
{{ end }}

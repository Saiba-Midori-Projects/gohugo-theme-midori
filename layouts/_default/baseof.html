<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">

<head>
    {{ partial "head.html" . }}
</head>

{{ $bg := .Site.Params.backgroundImage | default "images/default_bg.png" }}
<body style="--bg-img: url('{{ $bg | relURL }}');">
    <div class="root">
        <div class="layout-shell{{ if ne .TableOfContents "" }} layout-shell--with-toc{{ end }}">
            <div class="card">
                <header>
                    {{ partial "header.html" . }}
                </header>
                <main>
                    {{ block "main" . }}{{ end }}
                </main>
                <hr />
                <footer>
                    {{ partial "footer.html" . }}
                </footer>
            </div>

            {{ block "toc" . }}{{ end }}
        </div>
    </div>

    <button class="back-to-top" type="button" aria-label="返回顶部">
        <span class="material-icons back-to-top__icon" aria-hidden="true">arrow_upward</span>
        <span class="back-to-top__label">返回顶部</span>
    </button>

    <script>
        (function() {
            const themeName = '{{ .Site.Params.themeName | default "Midori" }}';
            const version = '{{ .Site.Params.version | default "0.1.0" }}';
            const hugoVersion = '{{ hugo.Version }}';

            console.log(
                `%c Theme ${themeName} %c v${version} %c Hugo ${hugoVersion} `,
                'background: #44c96a; color: #fff; padding: 5px 0; border-radius: 3px 0 0 3px; font-weight: bold;',
                'background: #333; color: #fff; padding: 5px 0; font-weight: bold;',
                'background: #eee; color: #333; padding: 5px 0; border-radius: 0 3px 3px 0;'
            );
        })();
    </script>
</body>

</html>
